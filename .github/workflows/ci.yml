name: Quality Check
permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Type check / vet
        run: go vet ./...

      - name: Lint
        run: gofmt -w *.go

  registries:
    needs: quality-check
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: ghcr.io/tegarwk/app:${{ github.sha }}
